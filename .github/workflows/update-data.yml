name: Update Data
on: repository_dispatch

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch and update changes
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          RELATIVE_PATH: ${{ github.event.client_payload.relativePath }}
          STATUS: ${{ github.event.client_payload.status }}
        run: |
          echo "Provider: $PROVIDER"
          echo "Route: $RELATIVE_PATH"
          echo "Status: $STATUS"

          if [ "$STATUS" = "D" ]; then
            echo "Route was deleted, skipping"
            exit 0
          fi

          # Derive change file path: relativePath "v1/chat/completions/post.json"
          # becomes "changes/<provider>/v1/chat/completions/post.yml"
          CHANGE_FILE="changes/${PROVIDER}/${RELATIVE_PATH%.json}.yml"
          YAML_URL="https://raw.githubusercontent.com/gr2m/ai-provider-monitor/main/${CHANGE_FILE}"

          echo "Fetching: $YAML_URL"
          HTTP_STATUS=$(curl -s -o /tmp/changes.yml -w "%{http_code}" "$YAML_URL")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "No change file found (HTTP $HTTP_STATUS)"
            exit 0
          fi

          node scripts/update-route.js "$PROVIDER" "$RELATIVE_PATH" /tmp/changes.yml

      - name: Commit and push
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          RELATIVE_PATH: ${{ github.event.client_payload.relativePath }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changes.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update: ${PROVIDER} ${RELATIVE_PATH}"

          # Retry push with rebase to handle concurrent workflow runs
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), pulling with rebase and re-applying..."
            git pull --rebase
            # Re-run the update on the rebased data to avoid conflicts
            node scripts/update-route.js "$PROVIDER" "$RELATIVE_PATH" /tmp/changes.yml
            git add data/changes.json
            if git diff --cached --quiet; then
              echo "Changes already present after rebase, nothing to push"
              exit 0
            fi
            git commit --amend --no-edit
          done
          echo "Failed to push after 5 attempts"
          exit 1
