name: Update Data
on: repository_dispatch

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Update changes
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          ROUTE: ${{ github.event.client_payload.route }}
          CHANGES: ${{ toJson(github.event.client_payload.changes) }}
        run: |
          echo "Provider: $PROVIDER"
          echo "Route: $ROUTE"

          node scripts/update-route.js "$PROVIDER" "$ROUTE" "$CHANGES"

      - name: Commit and push
        env:
          PROVIDER: ${{ github.event.client_payload.provider }}
          ROUTE: ${{ github.event.client_payload.route }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changes.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update: ${PROVIDER} ${ROUTE}"
          git push
